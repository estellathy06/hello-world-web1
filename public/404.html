<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
    <script>
        // GitHub Pages SPA redirect: converts the path into a query string
        // so that index.html can restore the correct route for react-router
        const path = window.location.pathname;
        const search = window.location.search;
        const hash = window.location.hash;
        window.location.replace(
            window.location.origin + '/hello-world-web1/?redirect=' + encodeURIComponent(path + search + hash)
        );
    </script>
</head>

<body>
    Redirecting...
</body>

</html>
